<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex">
  <title>VVE Clean — Booking</title>
  <script>
    // Read legacy URL params (old links like /booking.html?service=...&price=...)
    // and save to sessionStorage before redirecting to the React booking page.
    try {
      var p = new URLSearchParams(location.search);
      var s = p.get('service'), pr = p.get('price');
      if (s) {
        sessionStorage.setItem('vve_booking', JSON.stringify({
          serviceName: s,
          price: Number(pr) || 0
        }));
      }
    } catch (e) {}
    window.location.replace('/booking');
  </script>
</head>
<body></body>
</html>
